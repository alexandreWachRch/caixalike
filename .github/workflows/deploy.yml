name: Deploy CaixaLike → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite acionamento manual pela interface do GitHub

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:             "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload do artefato (site estático)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # Toda a raiz do repositório é o site

      - name: 🚀 Deploy para GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v4
